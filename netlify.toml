[build]
  base = "legalmind-frontend"
  command = "pnpm install --frozen-lockfile=false && pnpm build"
  publish = "legalmind-frontend/dist"

[build.environment]
  NPM_FLAGS = "--version"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"
