[build]
  base = "."
  publish = "legalmind-frontend/dist"
  command = "./build.sh"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.4.1"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-api.netlify.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  command = "cd legalmind-frontend && pnpm run dev"
  port = 5173
  publish = "legalmind-frontend/dist"